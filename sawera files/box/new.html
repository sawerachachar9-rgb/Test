<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.heading{
  background-color: antiquewhite;
  color: rgb(224, 16, 16);
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 30px;
}
/* container */
.container{
  display:flex;
    justify-content:center;
  align-items:center;
  gap:70px;

}
/* card */
.card{
  height:400px;
  transition: transform 0.3s ease;
}
/* image */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius: 30px;
  transition: transform 0.4s ease;
}
.card:hover img{
  transform: scale(1,2);
}

/* overlay */
.overlay{
  font-size: 70px;
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.5);
  color:white;
}



    </style>
</head>
<body>
  
    
<div class="heading">
  <h1>Image Cards with Transition</h1>
</div>
<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
    <div class="overlay">Salad</div>
  </div>

    <div class="card">
    <img src="">

</body>
</html>
