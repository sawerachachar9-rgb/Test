<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.parent{
display: grid;
gap: 30px;
padding: 20px;

grid-template-columns:1fr 1fr 1fr ;
grid-template-rows:150px 200px 150px 150px ;
grid-template-areas: 
"header header header"
"sidebr container1 container1"
"sidebar container2 container3"
"footer footer footer"
;

}

.header{
grid-area:header;
background-color: purple;
}
.sidebar
{

grid-area: sidebar;
background-color: blue;

}






.container1{
grid-area: container1;
background-color: greenyellow;
}
.container2{
grid-area: container2;
    background-color: pink;
}
.container3{
grid-area: container3;
    background-color: palegreen;
}
.footer{
grid-area: footer;
background-color: fuchsia;

}
.parent >div{
color: white;
display: flex;
justify-content: center;
align-items: center;
border-radius: 20px;
font-size: 30px;
font-weight: bold;


}

















































    </style>
</head>
<body>
<div>
<div class="parent">
<div class="header">header</div>
<div class="sidebar">sidebar</div>
<div class="container1">container1</div>
<div class="container2">container2</div>
<div class="container3">container3</div>
<div class="footer">footer</div>








</div>    

































































</body>
</html>
